<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
    background: linear-gradient(135deg, #eef2f7, #dfe9f3);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    padding: 24px;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 22px;
    color: #222;
  }
  .subtitle {
    margin: 0 0 20px;
    font-size: 13px;
    color: #888;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .input-row input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
  }
  .input-row input:focus {
    border-color: #6c8ef5;
  }
  .input-row button {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #6c8ef5;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
  }
  .input-row button:hover {
    background: #5578e0;
  }
  ul#list {
    list-style: none;
    margin: 0;
    padding: 0 4px 0 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 340px;
    overflow-y: auto;
  }
  ul#list::-webkit-scrollbar {
    width: 6px;
  }
  ul#list::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 3px;
  }
  li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    background: #f7f8fa;
  }
  li.checked span.label {
    text-decoration: line-through;
    color: #aaa;
  }
  li input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
  li span.label {
    flex: 1;
    font-size: 15px;
    word-break: break-word;
  }
  li button.delete {
    border: none;
    background: transparent;
    color: #d9534f;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 6px;
  }
  li button.delete:hover {
    color: #a94442;
  }
  .empty {
    text-align: center;
    color: #999;
    font-size: 14px;
    padding: 24px 0;
  }
  .footer {
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #999;
  }
  .footer button {
    border: none;
    background: transparent;
    color: #6c8ef5;
    cursor: pointer;
    font-size: 13px;
  }
  .footer button:hover {
    text-decoration: underline;
  }

  @media (prefers-color-scheme: dark) {
    body {
      background: linear-gradient(135deg, #1b1e26, #14161c);
    }
    .card {
      background: #22252e;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    h1 {
      color: #f0f0f0;
    }
    .subtitle {
      color: #9a9ea8;
    }
    .input-row input {
      background: #2c303a;
      border-color: #3a3f4b;
      color: #f0f0f0;
    }
    .input-row input::placeholder {
      color: #777c88;
    }
    .input-row input:focus {
      border-color: #7c9bff;
    }
    ul#list::-webkit-scrollbar-thumb {
      background: #444956;
    }
    li {
      background: #2c303a;
    }
    li span.label {
      color: #e6e6e6;
    }
    li.checked span.label {
      color: #6b7280;
    }
    .empty {
      color: #7d8290;
    }
    .footer {
      color: #7d8290;
    }
    .footer button {
      color: #7c9bff;
    }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">항목을 추가하고, 체크하고, 삭제해보세요.</p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="예: 우유, 계란, 빵..." maxlength="100">
      <button id="addBtn">추가</button>
    </div>

    <ul id="list"></ul>
    <p class="empty" id="emptyMsg">아직 항목이 없어요. 위에서 추가해보세요!</p>

    <div class="footer">
      <span id="countText">0개 항목</span>
      <button id="clearCheckedBtn">완료 항목 지우기</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://xjttzbekbvnctssgsqnt.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_WKoMO2cDZE6dQcGv6gOG7Q_QPDHa-hq';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const TABLE = 'shopping_items';

  const listEl = document.getElementById('list');
  const inputEl = document.getElementById('itemInput');
  const addBtn = document.getElementById('addBtn');
  const emptyMsg = document.getElementById('emptyMsg');
  const countText = document.getElementById('countText');
  const clearCheckedBtn = document.getElementById('clearCheckedBtn');

  let items = [];

  async function loadItems() {
    const { data, error } = await db
      .from(TABLE)
      .select('*')
      .order('created_at', { ascending: true });
    if (error) {
      console.error('항목을 불러오지 못했습니다:', error);
      return [];
    }
    return data;
  }

  function render() {
    listEl.innerHTML = '';
    items.forEach(item => {
      const li = document.createElement('li');
      li.className = item.checked ? 'checked' : '';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = item.checked;
      checkbox.addEventListener('change', async () => {
        item.checked = checkbox.checked;
        render();
        const { error } = await db
          .from(TABLE)
          .update({ checked: item.checked })
          .eq('id', item.id);
        if (error) console.error('업데이트 실패:', error);
      });

      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = item.text;

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete';
      deleteBtn.textContent = '✕';
      deleteBtn.title = '삭제';
      deleteBtn.addEventListener('click', async () => {
        items = items.filter(i => i.id !== item.id);
        render();
        const { error } = await db.from(TABLE).delete().eq('id', item.id);
        if (error) console.error('삭제 실패:', error);
      });

      li.appendChild(checkbox);
      li.appendChild(label);
      li.appendChild(deleteBtn);
      listEl.appendChild(li);
    });

    emptyMsg.style.display = items.length === 0 ? 'block' : 'none';
    const checkedCount = items.filter(i => i.checked).length;
    countText.textContent = `${items.length}개 항목 (완료 ${checkedCount})`;
  }

  async function addItem() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    const { data, error } = await db
      .from(TABLE)
      .insert({ text })
      .select()
      .single();
    if (error) {
      console.error('추가 실패:', error);
      return;
    }
    items.push(data);
    render();
    inputEl.focus();
  }

  addBtn.addEventListener('click', addItem);
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addItem();
  });
  clearCheckedBtn.addEventListener('click', async () => {
    const checkedIds = items.filter(i => i.checked).map(i => i.id);
    items = items.filter(i => !i.checked);
    render();
    if (checkedIds.length) {
      const { error } = await db.from(TABLE).delete().in('id', checkedIds);
      if (error) console.error('완료 항목 삭제 실패:', error);
    }
  });

  (async () => {
    items = await loadItems();
    render();
  })();
</script>
</body>
</html>
